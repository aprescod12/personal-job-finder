name: Django tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check

      - name: Capture targeted test output
        id: targeted_tests
        shell: bash
        run: |
          set +e
          python manage.py test tracker.test_job_extraction_fallback tracker.test_job_extraction_provider --verbosity 2 > step3c-test-output.txt 2>&1
          code=$?
          echo "$code" > step3c-test-exit-code.txt
          exit 0

      - name: Upload targeted test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step3c-test-output
          path: |
            step3c-test-output.txt
            step3c-test-exit-code.txt

      - name: Enforce targeted test result
        shell: bash
        run: test "$(cat step3c-test-exit-code.txt)" = "0"
