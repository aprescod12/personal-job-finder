name: Django tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check

      - name: Validate extraction evaluation cases
        run: python manage.py validate_job_extraction_cases

      - name: Run deterministic extraction evaluation
        run: python manage.py evaluate_job_extraction --format json --output /tmp/deterministic-baseline.json

      - name: Run evaluation tests with diagnostics
        shell: bash
        run: |
          set -o pipefail
          python manage.py test tracker.test_job_extraction_evaluation_runner -v 2 2>&1 | tee /tmp/evaluation-tests.log

      - name: Upload evaluation test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-test-diagnostics
          path: /tmp/evaluation-tests.log
