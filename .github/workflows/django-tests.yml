name: Django tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check

      - name: Validate evaluation cases
        run: python manage.py validate_job_extraction_cases

      - name: Run offline job evaluation
        run: python manage.py evaluate_job_extraction --format json --output /tmp/job-evaluation.json

      - name: Run offline resume evaluation
        run: python manage.py evaluate_resume_extraction --provider deterministic --minimum-agreement 60 --output /tmp/resume-evaluation.json

      - name: Run tests
        run: |
          set -o pipefail
          python manage.py test 2>&1 | tee /tmp/django-tests.log

      - name: Upload test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-failure-log
          path: /tmp/django-tests.log
          if-no-files-found: ignore
          retention-days: 3
