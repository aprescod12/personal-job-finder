{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amiri's Job Finder{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tracker/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container nav-row">
            <a class="brand" href="{% url 'job_list' %}" aria-label="Amiri's Job Finder dashboard">
                <span class="brand-mark">AJF</span>
                <span class="brand-copy">
                    <strong>AMIRI'S JOB FINDER</strong>
                    <small>CAREER COMMAND CENTER</small>
                </span>
            </a>
            <a class="button button-primary" href="{% url 'job_create' %}">+ ADD JOB</a>
        </div>
    </header>

    <main class="container page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-row">
            <span>AMIRI'S JOB FINDER / STAGE 01</span>
            <span class="footer-code">TRACK · PRIORITIZE · ACT</span>
        </div>
    </footer>
</body>
</html>
